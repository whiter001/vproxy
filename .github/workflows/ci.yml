name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install V
        uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      - name: Check formatting
        shell: bash
        run: |
          bash scripts/fmt.sh
          git diff --exit-code

  build:
    strategy:
      fail-fast: false
      matrix:
        proxy: [http, socks5, socks4]
        target: [linux-x86_64, darwin-x86_64, darwin-arm64, windows-x86_64]
        include:
          - proxy: http
            src: proxy/http/1/proxy.1.v
          - proxy: socks5
            src: proxy/socks5/1/proxy.socks5.v
          - proxy: socks4
            src: proxy/socks4/1/proxy.socks4.v
          - target: windows-x86_64
            os: windows-latest
            bin_ext: .exe
          - target: linux-x86_64
            os: ubuntu-latest
          - target: darwin-x86_64
            os: macos-latest
            vflags: -d cross_compile_macos_x86_64
          - target: darwin-arm64
            os: macos-latest
            vflags: -d cross_compile_macos_arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install V
        uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      - name: Build ${{ matrix.proxy }} proxy
        shell: bash
        env:
          VFLAGS: ${{ matrix.vflags }}
        run: |
          mkdir -p ./bin
          v -o ./bin/proxy.${{ matrix.proxy }}.${{ matrix.target }}${{ matrix.bin_ext }} ${{ matrix.src }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.proxy }}-${{ matrix.target }}
          path: bin/*

  test:
    runs-on: ubuntu-latest
    needs: format

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install V
        uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      - name: Run integration tests
        shell: bash
        run: |
          # issue #1 / #15：HTTP 代理要求显式凭据；未设置会 fail-fast
          # 同时这些 env 也被 main 通过 vpcli 解析，必须 export 而不是 bash 局部变量
          export PROXY_AUTH_USER=user
          export PROXY_AUTH_PASS=pwd
          export SOCKS5_AUTH_USERNAME=user
          export SOCKS5_AUTH_PASSWORD=pwd

          # Test HTTP proxy
          v run proxy/http/1/proxy.1.v &
          HTTP_PID=$!
          sleep 3
          curl --fail --silent --show-error \
            --proxy-user "${PROXY_AUTH_USER}:${PROXY_AUTH_PASS}" \
            -x 127.0.0.1:5777 https://httpbin.org/get \
            || { kill $HTTP_PID 2>/dev/null; exit 1; }
          kill $HTTP_PID 2>/dev/null || true

          # Test SOCKS5 proxy
          v run proxy/socks5/1/proxy.socks5.v &
          SOCKS5_PID=$!
          sleep 3
          curl --fail --silent --show-error \
            --proxy-user "${SOCKS5_AUTH_USERNAME}:${SOCKS5_AUTH_PASSWORD}" \
            --socks5 127.0.0.1:5778 https://httpbin.org/get \
            || { kill $SOCKS5_PID 2>/dev/null; exit 1; }
          kill $SOCKS5_PID 2>/dev/null || true

          # Test SOCKS4 proxy（无认证模式；USERID 由 curl 隐式填 'curl'）
          v run proxy/socks4/1/proxy.socks4.v &
          SOCKS4_PID=$!
          sleep 3
          curl --fail --silent --show-error \
            --socks4 127.0.0.1:5779 https://httpbin.org/get \
            || { kill $SOCKS4_PID 2>/dev/null; exit 1; }
          kill $SOCKS4_PID 2>/dev/null || true

  test-websocket:
    runs-on: ubuntu-latest
    needs: format

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install V
        uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      # WebSocket 协议 + SOCKS4 + lifecycle + CLI 解析（全部本地，无外网依赖）
      - name: Run integration tests (no network)
        shell: bash
        run: |
          bash proxy/http/1/test_websocket.sh
          bash proxy/socks4/1/test_protocol.sh
          bash proxy/lifecycle/test_lifecycle.sh
          bash proxy/vpcli/test_cli.sh

  release:
    runs-on: ubuntu-latest
    needs: [test, test-websocket, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release tag
        shell: bash
        run: |
          git tag "v${{ github.run_number }}"
          git push origin "v${{ github.run_number }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./bin
          merge-multiple: true

      - name: List artifacts
        shell: bash
        run: ls -laR ./bin/

      - name: Generate checksums
        shell: bash
        run: |
          cd ./bin
          find . -type f -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: |
            bin/**
          generate_release_notes: true
          name: v${{ github.run_number }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
