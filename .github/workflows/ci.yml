name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install V
        uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      - name: Check formatting
        shell: bash
        run: |
          bash scripts/fmt.sh
          git diff --exit-code

  build:
    strategy:
      fail-fast: false
      matrix:
        proxy: [http, socks5]
        target: [linux-x86_64, darwin-x86_64, darwin-arm64, windows-x86_64]
        include:
          - target: windows-x86_64
            os: windows-latest
            bin_ext: .exe
          - target: linux-x86_64
            os: ubuntu-latest
          - target: darwin-x86_64
            os: macos-latest
            vflags: -d cross_compile_macos_x86_64
          - target: darwin-arm64
            os: macos-latest
            vflags: -d cross_compile_macos_arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install V
        uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      - name: Build ${{ matrix.proxy }} proxy
        shell: bash
        env:
          VFLAGS: ${{ matrix.vflags }}
        run: |
          mkdir -p ./bin
          PROXY_DIR=proxy/${{ matrix.proxy }}/1
          v -o ./bin/proxy.${{ matrix.proxy }}.${{ matrix.target }}${{ matrix.bin_ext }} ${PROXY_DIR}/proxy.${{ matrix.proxy }}.v

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.proxy }}-${{ matrix.target }}
          path: bin/*

  test:
    runs-on: ubuntu-latest
    needs: format

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install V
        uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      - name: Run integration tests
        shell: bash
        run: |
          # Test HTTP proxy
          v run proxy/http/1/proxy.1.v &
          HTTP_PID=$!
          sleep 3
          curl --fail --silent --show-error -x 127.0.0.1:5777 https://httpbin.org/get || { kill $HTTP_PID 2>/dev/null; exit 1; }
          kill $HTTP_PID 2>/dev/null || true

          # Test SOCKS5 proxy
          v run proxy/socks5/1/proxy.socks5.v &
          SOCKS5_PID=$!
          sleep 3
          curl --fail --silent --show-error --socks5 127.0.0.1:5778 https://httpbin.org/get || { kill $SOCKS5_PID 2>/dev/null; exit 1; }
          kill $SOCKS5_PID 2>/dev/null || true

  release:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./bin

      - name: List artifacts
        shell: bash
        run: ls -laR ./bin/

      - name: Generate checksums
        shell: bash
        run: |
          cd ./bin
          find . -type f -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/**
          generate_release_notes: true
          name: v${{ github.run_number }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
